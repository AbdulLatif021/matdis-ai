<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MatDis AI — Matematika Diskrit</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  </head>
  <body class="auth-page">
    <!-- Animated Background -->
    <div class="bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>

    <div class="auth-container">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-infinity"></i></div>
        <h1>MatDis <span>AI</span></h1>
        <p>Platform Cerdas Matematika Diskrit</p>
      </div>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Masuk</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Daftar</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="auth-form" id="form-login">
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="login-email" placeholder="email@contoh.com" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-pass">
            <input type="password" id="login-password" placeholder="••••••••" />
            <i class="fas fa-eye toggle-pass" onclick="togglePass('login-password', this)"></i>
          </div>
        </div>
        <div id="login-error" class="error-msg" style="display: none"></div>
        <button class="btn-primary" onclick="handleLogin()"><span>Masuk</span> <i class="fas fa-arrow-right"></i></button>
        <p class="auth-switch">Belum punya akun? <a href="#" onclick="switchTab('register')">Daftar sekarang</a></p>
      </div>

      <!-- REGISTER FORM -->
      <div class="auth-form hidden" id="form-register">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Nama Lengkap</label>
          <input type="text" id="reg-name" placeholder="Nama kamu" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="reg-email" placeholder="email@contoh.com" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-id-card"></i> NIM / NIP</label>
          <input type="text" id="reg-nim" placeholder="Nomor induk" />
        </div>
        <div class="form-group">
          <label><i class="fas fa-user-tag"></i> Role</label>
          <select id="reg-role">
            <option value="">-- Pilih Role --</option>
            <option value="mahasiswa">Mahasiswa</option>
            <option value="dosen">Dosen</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-pass">
            <input type="password" id="reg-password" placeholder="Min. 6 karakter" />
            <i class="fas fa-eye toggle-pass" onclick="togglePass('reg-password', this)"></i>
          </div>
        </div>
        <div id="reg-error" class="error-msg" style="display: none"></div>
        <div id="reg-success" class="success-msg" style="display: none"></div>
        <button class="btn-primary" onclick="handleRegister()"><span>Buat Akun</span> <i class="fas fa-user-plus"></i></button>
        <p class="auth-switch">Sudah punya akun? <a href="#" onclick="switchTab('login')">Masuk</a></p>
      </div>

      <!-- Loading -->
      <div id="auth-loading" class="loading-overlay" style="display: none">
        <div class="spinner"></div>
        <p>Memproses...</p>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
